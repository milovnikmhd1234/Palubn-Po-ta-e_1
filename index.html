<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synergy Panel Animovaný</title>
<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:#fff;overflow:hidden;}
header{background:#02142e;padding:10px;display:flex;justify-content:space-between;font-size:18px;}
.panel{padding:15px;position:relative;overflow:hidden;height:350px;}
.current{font-size:28px;font-weight:bold;margin-bottom:5px;transition:all 0.5s;}
.next{font-size:16px;opacity:0.8;transition:all 0.5s;}
.delay{font-size:18px;margin-top:10px;}
.green{color:#00ff88;}
.yellow{color:#ffd500;}
.orange{color:#ff8c00;}
.red{color:#ff3b3b;}
input,select,button{width:100%;margin:6px 0;padding:8px;border-radius:4px;border:1px solid #444;font-size:15px;}
button{background:#05204a;color:#fff;cursor:pointer;}
button:hover{background:#0a3a87;}
</style>
</head>
<body>

<header>
  <div>Synergy Panel</div>
  <div id="clock"></div>
</header>

<div class="panel">
  <div class="current" id="currentStop">--</div>
  <div class="next" id="nextStops"></div>
  <div class="delay" id="delayBox">Zpoždění: 0 min</div>

  <select id="lineSelect">
    <option value="">Vyber linku</option>
    <option value="101A">101A</option>
    <option value="102B">102B</option>
    <option value="103C">103C</option>
  </select>

  <input type="text" id="tripInput" placeholder="Spoj (např. 1)">
  <textarea id="inputStops" placeholder="Zastávka - čas (např: Náměstí - 08:00)"></textarea>

  <button onclick="loadLine()">Načíst linku</button>
  <button onclick="prevStop()">⬅️ Předchozí</button>
  <button onclick="nextStop()">➡️ Další</button>
  <button onclick="playAnnouncement()">🔊 Hlášení</button>
</div>

<audio id="gong" src="https://www.prazsketramvaje.cz/zvuky/praha-zastavky/ostatni/gong.mp3"></audio>

<script>
// ===== CLOCK =====
function updateClock(){
  const d=new Date();
  document.getElementById("clock").innerText=
    d.getHours().toString().padStart(2,"0")+":"+
    d.getMinutes().toString().padStart(2,"0")+":"+
    d.getSeconds().toString().padStart(2,"0");
}
setInterval(updateClock,1000);

// ===== DATA =====
let stops=[],index=0;
let animating=false;

// ===== LOAD LINE =====
function loadLine(){
  const line=document.getElementById("lineSelect").value;
  const trip=document.getElementById("tripInput").value.trim();
  const linesData=document.getElementById("inputStops").value.split("\n");

  if(!line || !trip){
    alert("Vyber linku a zadej spoj!");
    return;
  }

  stops=[];
  linesData.forEach(l=>{
    if(!l.trim()) return;
    const parts=l.split("-");
    stops.push({
      name:parts[0].trim(),
      time:parts[1]?.trim() || "00:00",
      delay: Math.floor(Math.random()*11)-5 // simulace -5 až +5 min
    });
  });
  index=0;
  render(true);
}

// ===== RENDER =====
function render(animateTransition=false){
  if(!stops[index]) return;

  const curDiv=document.getElementById("currentStop");
  const nextDiv=document.getElementById("nextStops");
  const delayBox=document.getElementById("delayBox");

  if(animateTransition){
    curDiv.style.transform="translateY(-50px)";
    curDiv.style.opacity="0";
    setTimeout(()=>{
      curDiv.innerText=stops[index].name + " (" + stops[index].time + ")";
      curDiv.style.transform="translateY(0px)";
      curDiv.style.opacity="1";
    },200);
  } else {
    curDiv.innerText=stops[index].name + " (" + stops[index].time + ")";
  }

  let nextHTML="";
  for(let i=index+1;i<stops.length;i++){
    nextHTML+=stops[i].name+" ("+stops[i].time+")<br>";
  }
  nextDiv.innerHTML=nextHTML;

  // zpoždění
  const d=stops[index].delay;
  delayBox.innerText="Zpoždění: "+(d>=0?"+":"")+d+" min";
  delayBox.className="delay";
  if(d<0) delayBox.classList.add("green");
  else if(d<=2) delayBox.classList.add("yellow");
  else if(d<=5) delayBox.classList.add("orange");
  else delayBox.classList.add("red");
}

// ===== POSUN =====
function nextStop(){
  if(index<stops.length-1){
    index++;
    render(true);
  }
}
function prevStop(){
  if(index>0){
    index--;
    render(true);
  }
}

// ===== HLÁŠENÍ =====
function playAnnouncement(){
  const stop=stops[index];
  if(!stop) return;

  const g=document.getElementById("gong");
  g.currentTime=0;
  g.play();

  setTimeout(()=>{
    const msg=new SpeechSynthesisUtterance("Příští zastávka " + stop.name);
    msg.lang="cs-CZ";
    msg.pitch=1.2;
    msg.rate=0.9;
    speechSynthesis.speak(msg);
  },800);
}

</script>
</body>
</html>
