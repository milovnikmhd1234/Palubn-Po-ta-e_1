<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synergy 2D MAX – Hra</title>
<style>
body{margin:0;font-family:sans-serif;background:#1b1b2f;color:#fff;overflow:hidden;}
header{background:#05204a;padding:10px;display:flex;align-items:center;}
#hamburger{cursor:pointer;font-size:24px;margin-right:10px;}
#sidebar{position:fixed;left:-320px;top:0;width:320px;height:100%;background:#08306b;transition:0.3s;padding:50px 10px;}
#sidebar.open{left:0;}
#sidebar select,#sidebar button,#sidebar input{width:90%;margin:5px;padding:5px;}
#map{position:relative;width:100%;height:400px;background:#0a1b2c;overflow:hidden;}
.bus{position:absolute;width:60px;height:30px;background:red;color:#fff;text-align:center;line-height:30px;border-radius:4px;}
.passenger{position:absolute;width:15px;height:15px;background:yellow;border-radius:50%;}
#eco,#calendar{padding:10px;background:#111;}
body.day{background:#87ceeb;}
body.night{background:#0a1b2c;}
</style>
</head>
<body class="day">

<header>
<span id="hamburger">☰</span>
<h2>Synergy 2D MAX</h2>
</header>

<div id="sidebar">
<h3>Linka</h3>
<select id="line">
<option value="">Vyber linku</option>
<option value="1">1: Divadlo → Kaufland</option>
<option value="2">2: Tesco → Restaurace</option>
<option value="3">3 ⚡ Trolejbus</option>
</select>

<h3>Autobus</h3>
<select id="bus">
<option value="">Vyber autobus</option>
<option value="SOR CNG12|0|cng">SOR CNG12 (Free)</option>
<option value="SOR ENS12|50000|electric">SOR ENS12 (€50k)</option>
<option value="Karosa ŠM11|70000|diesel">Karosa ŠM11 (€70k)</option>
<option value="Solaris Urbino 12|35000|diesel">Solaris Urbino 12 (€35k)</option>
<option value="Iveco Streetway|40000|diesel">Iveco Streetway (€40k)</option>
</select>

<button onclick="start()">Start výjezdu</button>

<h3>Cheaty / Admin</h3>
<input id="cmd" placeholder="Zadej kód">
<button onclick="runCmd()">Spustit</button>

<h3>Přehled</h3>
<div id="eco">€0</div>
<div id="calendar">Týden: 1 | Den: 1 | Měsíc: 1 | Rok: 2026</div>
</div>

<div id="map"></div>

<audio id="gong" src="https://www.prazsketramvaje.cz/zvuky/praha-zastavky/ostatni/gong.mp3"></audio>

<script>
// --- Stav hry ---
let money=0;
let infinite=false;
let admin=false;
let owned=["SOR CNG12"];
let week=1, day=1, month=1, year=2026;
let busEl=document.createElement("div");
let passengers=[];
let stops=[], stopIndex=0;
let fuelType="diesel";
let gameInterval=null;

busEl.className="bus";
document.getElementById("map").appendChild(busEl);

// --- Sidebar toggle ---
document.getElementById("hamburger").onclick=()=>{document.getElementById("sidebar").classList.toggle("open");}

// --- Cheat příkazový řádek ---
function runCmd(){
let c=document.getElementById("cmd").value;
if(c==="726262"){money+=626226;}
if(c==="Djau71792!"){infinite=true;}
if(c==="721772727272)2)2)/):€:):):€::)"){admin=true;alert("ADMIN MODE")}
updateMoney();
}

// --- Start výjezdu ---
function start(){
let line=document.getElementById("line").value;
let busData=document.getElementById("bus").value;
if(!line||!busData){alert("Vyber linku i autobus");return;}
let [name,price,type]=busData.split("|");
if(!owned.includes(name)){
if(money<price && !infinite){alert("Nemáš prachy");return;}
money-=price; owned.push(name);
}
fuelType=type;

// Definice zastávek
if(line=="1") stops=["Divadlo","ZOO","Hlavní Nádraží","COOP","Kaufland"];
if(line=="2") stops=["Tesco","Divadlo","ZOO","Restaurace"];
if(line=="3") stops=["Depo","Náměstí","Nemocnice","Sídliště"];

stopIndex=0;
busEl.innerText=name;
move();
}

// --- Pohyb autobusu ---
function move(){
if(stopIndex>=stops.length){stopIndex=0;clearPassengers();return;}
busEl.style.left=(stopIndex*80)+"px";
updatePassengers();

let current=stops[stopIndex];
let next=stops[stopIndex+1]||"konec";

// Hlášení
speechSynthesis.speak(new SpeechSynthesisUtterance("Zastávka "+current+". Příští "+next));
document.getElementById("gong").play();

// Peníze
if(!infinite){
let psg=Math.floor(Math.random()*10+1);
money+=psg*45;
if(fuelType==="diesel") money-=5;
if(fuelType==="cng") money-=3;
if(fuelType==="electric") money-=2;
}

// Bonus linka
if(stopIndex===stops.length-1){
if(stops.includes("Kaufland")) money+=50;
if(stops.includes("Restaurace")) money+=60;
}
updateMoney();
stopIndex++;
setTimeout(move,2000);
}

// --- Passengers ---
function updatePassengers(){
clearPassengers();
let psgNum=Math.floor(Math.random()*5+1);
for(let i=0;i<psgNum;i++){
let p=document.createElement("div");
p.className="passenger";
p.style.left=(stopIndex*80+Math.random()*50)+"px";
p.style.top=(200+Math.random()*50)+"px";
document.getElementById("map").appendChild(p);
passengers.push(p);
}
}

function clearPassengers(){
passengers.forEach(p=>p.remove());
passengers=[];
}

// --- Peníze ---
function updateMoney(){document.getElementById("eco").innerText="€"+money;}

// --- Herní kalendář ---
function tickWeek(){
week++; day++; if(day>7){day=1; month++;}
if(month>12){month=1; year++;}
document.getElementById("calendar").innerText=`Týden: ${week} | Den: ${day} | Měsíc: ${month} | Rok: ${year}`;

// Odečítání nákladů
if(!infinite){money-=10;} // provozní náklady
updateMoney();

// Den/Noc
if(day>=6){document.body.className="night";} else {document.body.className="day";}
}

// --- Hra timer (10 min / týden) ---
gameInterval=setInterval(tickWeek, 10*1000); // pro demo zkráceno na 10s = 1 týden
</script>

</body>
</html>
