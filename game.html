<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synergy MHD Multiplayer</title>
<style>
body {margin:0;font-family:sans-serif;background:#fff;color:#000;}
#ui {position:fixed;top:10px;left:10px;background:#f9f9f9;padding:10px;border:1px solid #ccc;z-index:100;width:250px;}
canvas {width:100%;height:100vh;background:#eee;display:block;}
button,input,select {margin:5px 0;padding:5px;width:100%;}
.log {height:100px;overflow:auto;background:#fff;border:1px solid #ccc;padding:5px;font-size:12px;}
</style>
</head>
<body>

<div id="ui">
<h3>Server</h3>
<button onclick="createRoom()">Vytvořit server</button>
<button onclick="joinRoom()">Připojit</button>
<div>Kód: <span id="roomCode">-</span></div>

<h3>Linka</h3>
<select id="line">
<option value="1">Linka 1: Divadlo → Kaufland</option>
<option value="2">Linka 2: Tesco → Restaurace</option>
<option value="trol">Trolejbusová linka</option>
</select>

<h3>Bus</h3>
<select id="bus">
<option value="cng">SOR CNG12 (Free)</option>
<option value="nsg18">SOR NSG18</option>
<option value="nb18">SOR NB18</option>
<option value="agora12">Irisbus Agora 12</option>
<option value="karosa_sm11">Karosa ŠM11</option>
<option value="ens12">SOR ENS12 (e-bus)</option>
<option value="streetway">Iveco Streetway</option>
<option value="sorc">SOR C 12</option>
</select>

<h3>Jízdenky</h3>
<select id="ticketType">
<option value="normal">Normal (45€)</option>
<option value="free">Zdarma</option>
<option value="child">6-15</option>
<option value="adult">15+</option>
<option value="ztp">ZTP</option>
<option value="luggage">Zavazadlo 3+kg</option>
<option value="dog">Pes</option>
</select>
<button onclick="sellTicket()">Prodat jízdenku</button>

<h3>Audit Log</h3>
<div class="log" id="audit"></div>

<h3>Cheat</h3>
<input id="cheatInput" placeholder="Zadej cheat kód">
<button onclick="runCheat()">Použít cheat</button>
</div>

<canvas id="c"></canvas>
<audio id="gong" src="https://www.prazsketramvaje.cz/zvuky/praha-zastavky/ostatni/gong.mp3"></audio>

<script type="module">
// ===== FIREBASE CONFIG =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5h2CHXSyMgsV8CdL1PnoEPRXvjz2VnYs",
  authDomain: "onlinegame1-154f9.firebaseapp.com",
  databaseURL: "https://onlinegame1-154f9-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "onlinegame1-154f9",
  storageBucket: "onlinegame1-154f9.appspot.com",
  messagingSenderId: "967929240906",
  appId: "1:967929240906:web:d675c04bd2cd577e75b5b3",
  measurementId: "G-8QKX8JC3YM"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== VARIABLES =====
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let playerId = Math.random().toString(36).substr(2, 9);
let room = "";
let players = {};
let x = 100, y = 200;
let money = 0;
let pax = 0;
let currentStop = 0;
let stopList = [];
let eventActive = false;

// UI
const roomCodeSpan = document.getElementById("roomCode");
const audit = document.getElementById("audit");
const lineSel = document.getElementById("line");
const busSel = document.getElementById("bus");
const ticketSel = document.getElementById("ticketType");
const gongAudio = document.getElementById("gong");
const cheatInput = document.getElementById("cheatInput");

// BUS IMAGES
const busImages = {
  cng:"https://upload.wikimedia.org/wikipedia/commons/3/3e/SOR_CN12.jpg",
  nsg18:"https://upload.wikimedia.org/wikipedia/commons/5/5f/SOR_NSG18.jpg",
  nb18:"https://upload.wikimedia.org/wikipedia/commons/2/21/SOR_NB18.jpg",
  agora12:"https://upload.wikimedia.org/wikipedia/commons/1/1b/Irisbus_Agora_12.jpg",
  karosa_sm11:"https://upload.wikimedia.org/wikipedia/commons/2/2b/Karosa.jpg",
  ens12:"https://upload.wikimedia.org/wikipedia/commons/5/5a/SOR_ENS12.jpg",
  streetway:"https://upload.wikimedia.org/wikipedia/commons/0/02/Iveco_Streetway.jpg",
  sorc:"https://upload.wikimedia.org/wikipedia/commons/3/3f/SOR_C12.jpg"
};
let img = new Image();

// ===== FUNCTIONS =====
function log(msg){
  let t=new Date();
  audit.innerHTML=`[${t.getHours()}:${t.getMinutes()}] ${msg}<br>` + audit.innerHTML;
}

// --- CREATE ROOM ---
function createRoom(){
  room = Math.random().toString(36).substr(2,5);
  roomCodeSpan.innerText = room;
  set(ref(db,"rooms/"+room),{});
  connect();
  log("Server vytvořen, čekám na hráče...");
}

// --- JOIN ROOM ---
function joinRoom(){
  room = prompt("Zadej kód:");
  roomCodeSpan.innerText = room;
  connect();
  log("Připojeno k serveru "+room);
}

// --- CONNECT ---
function connect(){
  const playerRef = ref(db,"rooms/"+room+"/players/"+playerId);
  set(playerRef,{x,y,money,pax,bus:busSel.value,currentStop:0,line:lineSel.value});
  onDisconnect(playerRef).remove();

  onValue(ref(db,"rooms/"+room+"/players"),snap=>{
    players = snap.val() || {};
  });
}

// --- DRAW PLAYERS ---
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Draw players
  for(let id in players){
    let p = players[id];
    img.src = busImages[p.bus] || busImages.cng;
    ctx.drawImage(img,p.x,p.y,80,40);

    // Draw stops
    if(id==playerId && stopList.length>0){
      ctx.fillStyle="black";
      ctx.font="16px sans-serif";
      ctx.fillText(`Další zastávka: ${stopList[currentStop] || "Konec"}`,10,canvas.height-30);
    }
  }

  requestAnimationFrame(draw);
}
draw();

// --- MOVE PLAYER ---
document.addEventListener("keydown",e=>{
  if(e.key=="ArrowRight") x+=10;
  if(e.key=="ArrowLeft") x-=10;
  if(e.key=="ArrowUp") y-=10;
  if(e.key=="ArrowDown") y+=10;

  if(room){
    update(ref(db,"rooms/"+room+"/players/"+playerId),{x,y});
  }
});

// --- JÍZDENKY ---
function sellTicket(){
  let price = 45;
  if(ticketSel.value=="free") price=0;
  money += price;
  pax++;
  if(room) update(ref(db,"rooms/"+room+"/players/"+playerId),{money,pax});
  log(`Jízdenka prodána (${ticketSel.value}, +${price}€)`);
}

// --- GONG ---
function gong(){gongAudio.play();}

// --- CHEAT ---
function runCheat(){
  let code = cheatInput.value;
  if(code=="726262"){ money+=626226; log("Cheat: +626226€"); }
  else if(code=="Djau71792!"){ money=Infinity; log("Cheat: Infinity money"); }
  else if(code=="721772727272)2)2)/):€:):):€::)"){ log("Cheat: Admin aktivní"); }
  update(ref(db,"rooms/"+room+"/players/"+playerId),{money});
}

// --- EVENTS ---
function triggerEvent(){
  if(eventActive) return;
  let events=["Vypadla elektřina","Plyn není ve vozovně","Příliš mnoho cestujících","Špatné počasí"];
  let e = events[Math.floor(Math.random()*events.length)];
  log("Event: "+e);
  eventActive=true;
  setTimeout(()=>{eventActive=false},10000);
}

// --- ANIMOVANÉ ZASTÁVKY ---
function startLine(){
  stopList = lineSel.value=="1"?["Divadlo","ZOO","Hlavní Nádraží","COOP","Kaufland"]:
             lineSel.value=="2"?["Tesco","Divadlo","ZOO","Restaurace"]:
             ["Start","Stop1","Stop2","Stop3","Konec"];
  currentStop=0;
  setInterval(()=>{
    if(currentStop<stopList.length){
      log("Příští zastávka: "+stopList[currentStop]);
      gong();
      money+=20; // výdělek za zastávku
      currentStop++;
      if(currentStop==stopList.length){
        log(`Linka dokončena, bonus: ${lineSel.value=="1"?50:lineSel.value=="2"?60:75}€`);
        money += lineSel.value=="1"?50:lineSel.value=="2"?60:75;
      }
      update(ref(db,"rooms/"+room+"/players/"+playerId),{money});
      triggerEvent();
    }
  },5000);
}

</script>
</body>
</html>
