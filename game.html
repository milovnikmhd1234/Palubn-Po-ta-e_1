<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synergy MHD PC</title>
<style>
body {margin:0;font-family:sans-serif;background:#0a1b2c;color:#fff;overflow-x:hidden;}
header {background:#05204a;color:#fff;padding:12px;display:flex;align-items:center;}
#hamburger {font-size:26px;cursor:pointer;margin-right:12px;}
h1 {font-size:18px;}
#time {margin-left:auto;font-size:16px;}
nav {position:fixed;left:-280px;top:0;width:280px;height:100vh;background:#08306b;color:#fff;transition:left 0.3s;overflow:auto;padding-top:50px;z-index:1000;}
nav.open {left:0;}
nav a {display:block;padding:12px;color:#fff;text-decoration:none;border-bottom:1px solid #0a3a87;}
nav a:hover {background:#0a3a87;}
main {padding:16px;}
input,select,button {width:100%;margin:6px 0;padding:8px;font-size:15px;border:1px solid #ccc;border-radius:4px;}
button {background:#05204a;color:#fff;cursor:pointer;}
button:hover {background:#0a3a87;}
.panel {background:#112d50;padding:10px;margin:10px 0;border-radius:6px;}
.bus-select {margin:5px 0;}
.stop-list {background:#0f3b70;padding:10px;border-radius:6px;max-height:180px;overflow:auto;}
</style>
</head>
<body>

<header>
<span id="hamburger">☰</span>
<h1>Synergy‑MHD PC</h1>
<div id="time"></div>
</header>

<nav id="sidebar">
<a href="#" id="closeNav">❌ Zavřít menu</a>
<a href="#" id="menu-jizdenky">Jízdenky</a>
<a href="#" id="menu-dopravci">Výběr Dopravce</a>
<a href="#" id="menu-admin">Admin</a>
<a href="#" id="menu-panel">Palubní Panel</a>
</nav>

<main>
<div id="content">

<!-- --- Výběr Dopravce a linky --- -->
<div class="panel" id="panel-dopravci">
<h2>Dopravní podnik</h2>
<select id="dp-select">
<option value="PID">PID</option>
<option value="DPP">DPP</option>
<option value="DPMB">DPMB</option>
<option value="DPO">DPO</option>
<option value="MDPO">MDPO</option>
<option value="PMDP">PMDP</option>
<option value="SAD">SAD Lučenec</option>
<option value="Z-Group">Z-Group Bus</option>
<option value="Arriva_C">Arriva Čechy</option>
<option value="Arriva_M">Arriva Morava a Slezsko</option>
<option value="TRANZDEV">TRANZDEV Slezko a Morava</option>
<option value="Bratislava">Bratislava</option>
</select>

<h2>Linka</h2>
<input type="text" id="line-input" placeholder="Zadej linku">
<h2>Spoj</h2>
<input type="text" id="trip-input" placeholder="Zadej spoj">
<button id="load-stops">Načíst zastávky</button>
</div>

<!-- --- Jízdenky --- -->
<div class="panel" id="panel-jizdenky" style="display:none;">
<h2>Prodej jízdenek</h2>
<select id="ticket-type">
<option value="zdarma">Zdarma</option>
<option value="6-15">6-15 let</option>
<option value="15+">15+ / 65+</option>
<option value="ZTP">Osoba ZTP</option>
<option value="zavazadlo">Zavazadlo 3+kg</option>
<option value="pes">Pes</option>
<option value="ep">Dobití EP</option>
</select>
<select id="ticket-pay">
<option value="bck">BČK</option>
<option value="ep">EP</option>
<option value="hotovost">Hotovost</option>
</select>
<button id="sell-ticket">Prodat</button>
<div id="ticket-log" class="stop-list"></div>
</div>

<!-- --- Admin --- -->
<div class="panel" id="panel-admin" style="display:none;">
<h2>Admin přihlášení</h2>
<input type="password" id="admin-pass" placeholder="Heslo">
<button id="admin-login">Přihlásit</button>
<div id="admin-status"></div>
</div>

<!-- --- Palubní Panel --- -->
<div class="panel" id="panel-pc" style="display:none;">
<h2>Palubní PC</h2>
<h3>Vybraný autobus:</h3>
<select id="bus-select" class="bus-select"></select>
<h3>Zastávky</h3>
<div id="stop-panel" class="stop-list"></div>
<button id="gong">🔔 Gong</button>
<h3>Pedály & Panely</h3>
<div>
<button id="door-btn">Dveře</button>
<button id="light-btn">Světla</button>
<button id="turn-left-btn">Blinkr L</button>
<button id="turn-right-btn">Blinkr P</button>
<button id="handbrake-btn">Ruční brzda</button>
</div>
<h3>Ekonomika</h3>
<div id="economy">Spotřeba EP / paliva: 0</div>
</div>

</div>
</main>

<audio id="gong-audio" src="https://www.prazsketramvaje.cz/zvuky/praha-zastavky/ostatni/gong.mp3"></audio>

<script>
/* --- Sidebar --- */
const hamburger=document.getElementById('hamburger'),
      sidebar=document.getElementById('sidebar'),
      closeNav=document.getElementById('closeNav');
hamburger.addEventListener('click',()=>{sidebar.classList.add('open')});
closeNav.addEventListener('click',()=>{sidebar.classList.remove('open')});

/* --- Hodiny --- */
function updateTime(){
    const d=new Date(),h=d.getHours(),m=d.getMinutes(),s=d.getSeconds();
    document.getElementById('time').textContent=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}
setInterval(updateTime,1000);
updateTime();

/* --- Menu přepínání panelů --- */
const menuJizdenky=document.getElementById('menu-jizdenky'),
      menuDopravci=document.getElementById('menu-dopravci'),
      menuAdmin=document.getElementById('menu-admin'),
      menuPanel=document.getElementById('menu-panel'),
      panelJizdenky=document.getElementById('panel-jizdenky'),
      panelDopravci=document.getElementById('panel-dopravci'),
      panelAdmin=document.getElementById('panel-admin'),
      panelPC=document.getElementById('panel-pc');

menuJizdenky.addEventListener('click',()=>{
    panelJizdenky.style.display='block';
    panelDopravci.style.display='none';
    panelAdmin.style.display='none';
    panelPC.style.display='none';
});
menuDopravci.addEventListener('click',()=>{
    panelJizdenky.style.display='none';
    panelDopravci.style.display='block';
    panelAdmin.style.display='none';
    panelPC.style.display='none';
});
menuAdmin.addEventListener('click',()=>{
    panelJizdenky.style.display='none';
    panelDopravci.style.display='none';
    panelAdmin.style.display='block';
    panelPC.style.display='none';
});
menuPanel.addEventListener('click',()=>{
    panelJizdenky.style.display='none';
    panelDopravci.style.display='none';
    panelAdmin.style.display='none';
    panelPC.style.display='block';
});

/* --- Admin login --- */
document.getElementById('admin-login').addEventListener('click',()=>{
    const pass=document.getElementById('admin-pass').value;
    document.getElementById('admin-status').textContent=(pass==='K3508O')?'Admin přihlášen':'Chybné heslo';
});

/* --- Autobusy --- */
const buses=[
"🔹 SOR: BN 8.5","SOR: BNG 12","SOR: NB 12","SOR: NB 18","SOR: NS 12","SOR: NS 18","SOR: EBN 8","SOR: EBN 9.5","SOR: EBN 10.5","SOR: C 9.5","SOR: C 12","SOR: CN 8.5","SOR: CN 9.5","SOR: CN 10.5","SOR: CN 12","SOR: LH 9.5","SOR: LH 10.5","SOR: LH 12","SOR: CNG 12",
"🔹 Karosa / Iveco / Irisbus: Karosa B 731","Karosa B 732","Karosa B 741","Karosa B 831","Karosa B 932","Karosa C 734","Karosa C 935","Karosa C 954","Karosa LC 735","Karosa LC 937","Karosa LC 956","Karosa ŠM 11","Iveco Urbanway 10.5M","Iveco Urbanway 12M","Iveco Crossway","Iveco Streetway","Irisbus Citelis 12M","Irisbus Citelis 18M","Irisbus Crossway LE",
"🔹 Solaris: Urbino 8.6","Urbino 10","Urbino 12","Urbino 15","Urbino 18","Urbino 24",
"🔹 ISUZU: NovoCiti","Novo Ultra",
"🔹 Renault / Irisbus: Agora","Citelis / Citybus","Crossway","Arway / Récréo",
"🔹 Škoda: 33Tr SOR","Škoda‑Solaris 24M",
"🔹 Ikarus: IK 280","IK 260","IK 250"
];
const busSelect=document.getElementById('bus-select');
buses.forEach(b=>{const o=document.createElement('option');o.textContent=b;busSelect.appendChild(o);});

/* --- Zastávky --- */
let stops=[];
document.getElementById('load-stops').addEventListener('click',()=>{
    const line=document.getElementById('line-input').value,
          trip=document.getElementById('trip-input').value;
    if(!line||!trip){alert('Zadej linku a spoj!');return;}
    // Simulované zastávky
    stops=[
        {name:"Hlavní nádraží",time:"08:00"},
        {name:"Nádraží město",time:"08:05"},
        {name:"Náměstí*",time:"08:10"},
        {name:"Konečná",time:"08:15"}
    ];
    updateStops();
});

/* --- Funkce pro zobrazení zastávek a animaci posunu --- */
function updateStops(){
    const panel=document.getElementById('stop-panel');
    panel.innerHTML='';
    stops.forEach((s,i)=>{
        const div=document.createElement('div');
        let delayClass='';
        if(i===0) delayClass='style="color:green"';
        div.innerHTML=`<span ${delayClass}>${s.time} - ${s.name}</span>`;
        panel.appendChild(div);
    });
}

/* --- Gong / ženské hlášení --- */
document.getElementById('gong').addEventListener('click', ()=>{
    if(stops.length === 0) return;
    
    const nextStop = stops[0].name.replace('*',' (na znamení)');
    const utterance = new SpeechSynthesisUtterance(`Příští zastávka: ${nextStop}`);
    utterance.lang = 'cs-CZ';
    utterance.voice = speechSynthesis.getVoices().find(v => v.lang==='cs-CZ') || null;
    
    speechSynthesis.speak(utterance);
    document.getElementById('gong-audio').play();
    
    utterance.onend = () => {
        stops.push(stops.shift());
        updateStops();
    };
});

/* --- Prodej jízdenek --- */
document.getElementById('sell-ticket').addEventListener('click',()=>{
    const type=document.getElementById('ticket-type').value;
    const pay=document.getElementById('ticket-pay').value;
    const log=document.getElementById('ticket-log');
    const entry=`Prodáno: ${type} | Platba: ${pay} | Čas: ${new Date().toLocaleTimeString()}`;
    log.textContent=entry+'\n'+log.textContent;
});

/* --- Pedály & panely --- */
document.getElementById('door-btn').addEventListener('click',()=>alert('Dveře přepnuty!'));
document.getElementById('light-btn').addEventListener('click',()=>alert('Světla přepnuta!'));
document.getElementById('turn-left-btn').addEventListener('click',()=>alert('Blinkr vlevo!'));
document.getElementById('turn-right-btn').addEventListener('click',()=>alert('Blinkr vpravo!'));
document.getElementById('handbrake-btn').addEventListener('click',()=>alert('Ruční brzda aktivní!'));

/* --- Ekonomika --- */
document.getElementById('bus-select').addEventListener('change',()=>{
    const bus=document.getElementById('bus-select').value;
    const economy=document.getElementById('economy');
    let consumption=0;
    if(bus.includes("SOR")||bus.includes("Škoda")) consumption=2;
    else if(bus.includes("Iveco")||bus.includes("Karosa")||bus.includes("Irisbus")) consumption=3;
    else if(bus.includes("Solaris")) consumption=2.5;
    else consumption=3.5;
    economy.textContent=`Spotřeba EP/paliva: ${consumption} l/100km`;
});
</script>

</body>
</html>
