<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synergy MHD 2D Multiplayer</title>
<style>
body { margin:0; font-family:sans-serif; background:#fff; color:#000; }
#sidebar {
  position: fixed; top:0; left:0; width:320px; height:100vh;
  background:#f0f0f0; border-right:1px solid #ccc; padding:10px; overflow-y:auto;
}
canvas { margin-left:320px; background:#d0e7f9; display:block; }
button,input,select { margin:5px 0; padding:5px; width:100%; }
.log { height:180px; overflow:auto; background:#fff; border:1px solid #ccc; padding:5px; font-size:12px; }
</style>
</head>
<body>

<div id="sidebar">
<h2>Synergy MHD</h2>

<h3>Server</h3>
<button onclick="createRoom()">Vytvořit server</button>
<button onclick="joinRoom()">Připojit se</button>
<div>Kód serveru: <span id="roomCode">-</span></div>

<h3>Linka</h3>
<select id="line">
<option value="1">Linka 1: Divadlo → Kaufland</option>
<option value="2">Linka 2: Tesco → Restaurace</option>
<option value="trol">Trolejbusová linka</option>
</select>
<button onclick="startLine()">Start linky</button>

<h3>Autobus</h3>
<select id="bus">
<option value="cng">SOR CNG12 (Free)</option>
<option value="nsg18">SOR NSG18 (200000€)</option>
<option value="nb18">SOR NB18 (180000€)</option>
<option value="agora12">Irisbus Agora 12 (250000€)</option>
<option value="karosa_sm11">Karosa ŠM11 (300000€)</option>
<option value="ens12">SOR ENS12 (e-bus) (400000€)</option>
<option value="streetway">Iveco Streetway (220000€)</option>
<option value="sorc">SOR C 12 (150000€)</option>
</select>
<button onclick="buyBus()">Koupit autobus</button>

<h3>Jízdenky</h3>
<select id="ticketType">
<option value="normal">Normal (45€)</option>
<option value="free">Zdarma</option>
<option value="child">6-15</option>
<option value="adult">15+</option>
<option value="ztp">ZTP</option>
<option value="luggage">Zavazadlo 3+kg</option>
<option value="dog">Pes</option>
</select>
<button onclick="sellTicket()">Prodat jízdenku</button>

<h3>Ekonomika</h3>
<div>Peněz: <span id="money">0</span>€</div>

<h3>Audit Log</h3>
<div class="log" id="audit"></div>

<h3>Cheat</h3>
<input id="cheatInput" placeholder="Zadej cheat kód">
<button onclick="runCheat()">Použít cheat</button>

<h3>Bonusy / Eventy</h3>
<button onclick="triggerEvent()">Spustit náhodný event</button>
</div>

<canvas id="c"></canvas>
<audio id="gong" src="https://www.prazsketramvaje.cz/zvuky/praha-zastavky/ostatni/gong.mp3"></audio>

<script type="module">
// ===== FIREBASE =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5h2CHXSyMgsV8CdL1PnoEPRXvjz2VnYs",
  authDomain: "onlinegame1-154f9.firebaseapp.com",
  databaseURL: "https://onlinegame1-154f9-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "onlinegame1-154f9",
  storageBucket: "onlinegame1-154f9.appspot.com",
  messagingSenderId: "967929240906",
  appId: "1:967929240906:web:d675c04bd2cd577e75b5b3",
  measurementId: "G-8QKX8JC3YM"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== GLOBAL VARIABLES =====
let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth-320;
canvas.height=window.innerHeight;

let playerId=Math.random().toString(36).substr(2,9);
let room="";
let players={};
let x=100,y=200;
let money=0,pax=0;
let currentStop=0;
let stopList=[];
let eventActive=false;
let busesOwned=["cng"];

const roomCodeSpan=document.getElementById("roomCode");
const audit=document.getElementById("audit");
const lineSel=document.getElementById("line");
const busSel=document.getElementById("bus");
const ticketSel=document.getElementById("ticketType");
const gongAudio=document.getElementById("gong");
const cheatInput=document.getElementById("cheatInput");
const moneySpan=document.getElementById("money");

// BUS IMAGES
const busImages={
  cng:"https://upload.wikimedia.org/wikipedia/commons/3/3e/SOR_CN12.jpg",
  nsg18:"https://upload.wikimedia.org/wikipedia/commons/5/5f/SOR_NSG18.jpg",
  nb18:"https://upload.wikimedia.org/wikipedia/commons/2/21/SOR_NB18.jpg",
  agora12:"https://upload.wikimedia.org/wikipedia/commons/1/1b/Irisbus_Agora_12.jpg",
  karosa_sm11:"https://upload.wikimedia.org/wikipedia/commons/2/2b/Karosa.jpg",
  ens12:"https://upload.wikimedia.org/wikipedia/commons/5/5a/SOR_ENS12.jpg",
  streetway:"https://upload.wikimedia.org/wikipedia/commons/0/02/Iveco_Streetway.jpg",
  sorc:"https://upload.wikimedia.org/wikipedia/commons/3/3f/SOR_C12.jpg"
};
let img=new Image();

// ===== FUNCTIONS =====
function log(msg){
  let t=new Date();
  let entry=`[${t.getHours()}:${t.getMinutes()}:${t.getSeconds()}] ${msg}`;
  audit.innerHTML=entry+"<br>"+audit.innerHTML;
  if(room){
    let logRef=ref(db,"rooms/"+room+"/audit");
    update(logRef,{[Date.now()]:entry});
  }
}

// --- ROOM ---
function createRoom(){
  room=Math.random().toString(36).substr(2,5);
  roomCodeSpan.innerText=room;
  set(ref(db,"rooms/"+room),{});
  connect();
  log("Server vytvořen, čekám na hráče...");
}
function joinRoom(){
  room=prompt("Zadej kód serveru:");
  if(!room) return;
  roomCodeSpan.innerText=room;
  connect();
  log("Připojeno k serveru "+room);
}

// --- CONNECT ---
function connect(){
  const playerRef=ref(db,"rooms/"+room+"/players/"+playerId);
  set(playerRef,{x,y,money,pax,bus:busSel.value,currentStop:0,line:lineSel.value});
  onDisconnect(playerRef).remove();
  onValue(ref(db,"rooms/"+room+"/players"),snap=>{
    players=snap.val()||{};
  });
  onValue(ref(db,"rooms/"+room+"/audit"),snap=>{
    let logs=snap.val()||{};
    audit.innerHTML="";
    Object.values(logs).reverse().forEach(l=>{audit.innerHTML+=l+"<br>";});
  });
}

// --- DRAW ---
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let id in players){
    let p=players[id];
    img.src=busImages[p.bus]||busImages.cng;
    ctx.drawImage(img,p.x,p.y,80,40);
    if(id==playerId && stopList.length>0){
      ctx.fillStyle="black";
      ctx.font="16px sans-serif";
      ctx.fillText(`Další zastávka: ${stopList[currentStop]||"Konec"}`,p.x,p.y-10);
    }
  }
  requestAnimationFrame(draw);
}
draw();
 // ===== STOPS & ANIMATION =====
const lines = {
  "1": ["Divadlo","ZOO","Hlavní Nádraží","COOP","Kaufland"],
  "2": ["Tesco","Divadlo","ZOO","Restaurace"],
  "trol": ["Elektrárna","Náměstí","Hlavní Nádraží","Depo"]
};

function startLine(){
  let selected=lineSel.value;
  if(!busesOwned.includes(busSel.value)){
    alert("Musíš mít zakoupený autobus!");
    return;
  }
  stopList=lines[selected].slice();
  currentStop=0;
  log(`Linka ${selected} spuštěna s autobusem ${busSel.value}`);
  moveBus();
}

function moveBus(){
  if(currentStop>=stopList.length){
    log("Linka dokončena!");
    let reward=(lineSel.value=="1"?50:(lineSel.value=="2"?60:75));
    money+=reward;
    moneySpan.innerText=money;
    return;
  }
  gongAudio.play();
  log(`Příjezd na zastávku: ${stopList[currentStop]}`);
  money+=20; // za každou zastávku
  moneySpan.innerText=money;
  currentStop++;
  setTimeout(moveBus,5000); // 5 sekund mezi zastávkami
}

// ===== TICKETS =====
function sellTicket(){
  let type=ticketSel.value;
  if(type=="free") { log("Prodána zdarma jízdenka"); return; }
  money+=45;
  moneySpan.innerText=money;
  log(`Prodána jízdenka typu ${type} (+45€)`);
}

// ===== BUY BUS =====
function buyBus(){
  let b=busSel.value;
  const prices={
    nsg18:200000, nb18:180000, agora12:250000, karosa_sm11:300000,
    ens12:400000, streetway:220000, sorc:150000
  };
  if(busesOwned.includes(b)){
    alert("Tento autobus již vlastníš");
    return;
  }
  let price=prices[b];
  if(money<price){ alert("Nemáš dost peněz!"); return; }
  money-=price;
  moneySpan.innerText=money;
  busesOwned.push(b);
  log(`Zakoupen autobus ${b} za ${price}€`);
}

// ===== EVENTS =====
const events=[
  {name:"Vypadla elektřina",bonus:-30},
  {name:"Plyn není ve vozovně",bonus:-20},
  {name:"Příliš mnoho cestujících",bonus:-10},
  {name:"Špatné počasí",bonus:-25},
  {name:"Bonus: dobrá reklama",bonus:+40}
];

function triggerEvent(){
  let e=events[Math.floor(Math.random()*events.length)];
  money+=e.bonus;
  moneySpan.innerText=money;
  log(`Event: ${e.name} (${e.bonus>=0?"+":"")}${e.bonus}€)`);
}

// ===== CHEATS =====
function runCheat(){
  let c=cheatInput.value.trim();
  if(c=="726262"){ money+=626226; log("Cheat: +626226€") }
  else if(c=="Djau71792!"){ money=Infinity; log("Cheat: Infinity money") }
  else if(c=="721772727272)2)2)/):€:):):€::)"){ log("Cheat: Admin mode aktivní") }
  else if(c=="event"){ triggerEvent(); log("Cheat: náhodný event spuštěn") }
  moneySpan.innerText=money;
  cheatInput.value="";
}

// ===== MULTIPLAYER SYNC =====
setInterval(()=>{
  if(!room) return;
  let playerRef=ref(db,"rooms/"+room+"/players/"+playerId);
  update(playerRef,{x,y,money,pax,bus:busSel.value,currentStop,line:lineSel.value});
},1000);

// ===== KEYBOARD CONTROLS =====
document.addEventListener("keydown",e=>{
  if(e.key=="ArrowRight") x+=10;
  if(e.key=="ArrowLeft") x-=10;
  if(e.key=="ArrowUp") y-=5;
  if(e.key=="ArrowDown") y+=5;
});

// ===== RESIZE =====
window.addEventListener("resize",()=>{canvas.width=window.innerWidth-320; canvas.height=window.innerHeight;});
