<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synergy 2D Výjezd – Kategorizované autobusy</title>
<style>
body {margin:0;font-family:sans-serif;background:#0a1b2c;color:#fff;}
#header {background:#05204a;padding:10px;display:flex;align-items:center;}
#time {margin-left:auto;}
#canvas-container {position:relative;width:100%;height:400px;background:#112d50;overflow:hidden;}
#road {position:absolute;bottom:0;width:100%;height:150px;background:#555;}
.bus {position:absolute;bottom:20px;width:80px;height:40px;border-radius:5px;text-align:center;font-size:10px;color:#fff;line-height:40px;font-weight:bold;}
#panel {padding:10px;background:#08306b;}
.panel-btn {padding:6px 10px;margin:2px;border:none;border-radius:4px;cursor:pointer;}
.panel-btn.active {background:#0f9fff;color:#000;}
.stop-list {margin-top:10px;background:#0a2a4c;padding:6px;height:80px;overflow:auto;}
.ticket-panel {margin-top:10px;padding:6px;background:#0a2a4c;border-radius:4px;}
select,input{width:100%;margin:2px 0;padding:4px;border-radius:3px;border:none;}
button {cursor:pointer;border-radius:3px;border:none;padding:5px;background:#0f9fff;color:#000;}
.brand-header {font-weight:bold;margin-top:6px;background:#0a3a87;padding:2px 4px;border-radius:3px;}
</style>
</head>
<body>

<div id="header">
<h1>Synergy 2D Výjezd</h1>
<div id="time"></div>
</div>

<div id="canvas-container">
<div id="road"></div>
</div>

<div id="panel">
<h3>Výběr linky</h3>
<select id="line-select">
<option value="">-- Vyber linku --</option>
<option value="sluzebni">Služební jízda</option>
<option value="1">1: Divadlo → ZOO → Hlavní Nádraží → COOP → Kaufland</option>
<option value="2">2: Tesco → Divadlo → ZOO → Restaurace</option>
</select>

<h3>Výběr autobusu podle značky</h3>
<div id="bus-select-container"></div>

<button id="start-btn">Spustit výjezd</button>

<h3>Palubní deska</h3>
<button class="panel-btn" id="door-btn">Dveře</button>
<button class="panel-btn" id="light-btn">Světla</button>
<button class="panel-btn" id="turn-left-btn">Blinkr L</button>
<button class="panel-btn" id="turn-right-btn">Blinkr P</button>
<button class="panel-btn" id="handbrake-btn">Ruční brzda</button>
<button class="panel-btn" id="gong">🔔 Gong</button>

<h3>Ekonomika</h3>
<div id="economy">Nafta:0 | CNG:0 | Údržba:0 | Autobusy:0</div>

<h3>Zastávky</h3>
<div id="stop-panel" class="stop-list"></div>

<h3>Jízdenky</h3>
<div class="ticket-panel">
Druh: 
<select id="ticket-type">
<option>Zdarma</option>
<option>6-15 let</option>
<option>15+ / 65+</option>
<option>ZTP</option>
<option>Zavazadlo 3+Kg</option>
<option>Pes</option>
<option>Dobití EP</option>
</select>
Platba:
<select id="payment">
<option>BČK</option>
<option>EP</option>
<option>Hotovost</option>
</select>
<button id="sell-ticket">Prodat</button>
</div>

</div>

<audio id="gong-audio" src="https://www.prazsketramvaje.cz/zvuky/praha-zastavky/ostatni/gong.mp3"></audio>

<script>
// --- Hodiny ---
function updateTime(){let d=new Date();document.getElementById('time').textContent=d.toLocaleTimeString();}
setInterval(updateTime,1000);updateTime();

// --- Autobusy s kategoriemi a barvami ---
const buses=[
{brand:"SOR",models:["BN 8.5","BNG 12","NB 12","NB 18","NS 12","NS 18","EBN 8","EBN 9.5","EBN 10.5","C 9.5","C 12","CN 8.5","CN 9.5","CN 10.5","CN 12","LH 9.5","LH 10.5","LH 12","CNG12"],color:"#f00"},
{brand:"IVECO/Irisbus/Karosa",models:["B 731","B 732","B 741","B 831","B 932","C 734","C 935","C 954","LC 735","LC 937","LC 956","Urbanway 10.5M","Urbanway 12M","Crossway","Citelis 12M","Citelis 18M","Crossway LE","Karosa ŠM11","Iveco Streetway"],color:"#0f0"},
{brand:"Solaris",models:["Urbino 8.6","Urbino 10","Urbino 12","Urbino 15","Urbino 18","Urbino 24"],color:"#ff0"},
{brand:"Isuzu",models:["NovoCiti","Novo Ultra"],color:"#0ff"},
{brand:"Renault/Irisbus",models:["Agora","Citelis","Citybus","Crossway","Arway","Récréo"],color:"#f0f"},
{brand:"Škoda",models:["33Tr SOR","Škoda-Solaris 24M"],color:"#0a0"},
{brand:"Ikarus",models:["260"],color:"#aaa"}
];

const busContainer=document.getElementById('bus-select-container');
buses.forEach(b=>{
  const header=document.createElement('div');
  header.classList.add('brand-header');
  header.textContent=b.brand;
  busContainer.appendChild(header);
  b.models.forEach(m=>{
    const btn=document.createElement('button');
    btn.textContent=m;
    btn.style.background=b.color;
    btn.style.color="#000";
    btn.classList.add('panel-btn');
    btn.addEventListener('click',()=>{selectedBus=m;alert("Vybran autobus: "+m);});
    busContainer.appendChild(btn);
  });
});

let selectedBus="";

// --- Linky ---
const lines={
"sluzebni":[],
"1":[{name:"Divadlo",time:"08:00"},{name:"ZOO",time:"08:05"},{name:"Hlavní Nádraží",time:"08:10"},{name:"COOP",time:"08:15"},{name:"Kaufland",time:"08:20"}],
"2":[{name:"Tesco",time:"08:00"},{name:"Divadlo",time:"08:05"},{name:"ZOO",time:"08:10"},{name:"Restaurace",time:"08:15"}]
};
let currentStop=0;
let currentLine=[];

// --- Start výjezdu ---
document.getElementById('start-btn').addEventListener('click',()=>{
  const lineId=document.getElementById('line-select').value;
  if(!lineId){alert("Vyber linku!"); return;}
  if(!selectedBus){alert("Vyber autobus!"); return;}
  currentLine=lines[lineId];
  currentStop=0;
  updateStopsPanel();
  animateBus();
});

// --- Zastávky ---
function updateStopsPanel(){
  const panel=document.getElementById('stop-panel'); panel.innerHTML='';
  currentLine.forEach((s,i)=>{
    const div=document.createElement('div');
    if(i===currentStop) div.innerHTML=`▶ ${s.time} - ${s.name}`;
    else if(i===currentStop+1) div.innerHTML=`⏭ Příští: ${s.time} - ${s.name}`;
    else div.textContent=`${s.time} - ${s.name}`;
    panel.appendChild(div);
  });
}

// --- Gong + hlášení ---
document.getElementById('gong').addEventListener('click',()=>{
  if(currentLine.length===0) return;
  const nextIndex=(currentStop+1)%currentLine.length;
  const nextStop=currentLine[nextIndex].name;
  const utter=new SpeechSynthesisUtterance(`Příští zastávka: ${nextStop}`);
  utter.lang='cs-CZ';
  speechSynthesis.speak(utter);
  document.getElementById('gong-audio').play();
  utter.onend=()=>{currentStop=nextIndex; updateStopsPanel();}
});

// --- Palubní panely ---
const buttons=['door','light','turn-left','turn-right','handbrake'];
buttons.forEach(b=>{
  const btn=document.getElementById(`${b}-btn`);
  btn.addEventListener('click',()=>{btn.classList.toggle('active');});
});

// --- Ekonomika ---
let economy=document.getElementById('economy');
let resources={nafta:0,cng:0,udrzba:0,autobusy:0};
function updateEconomy(){economy.textContent=`Nafta:${resources.nafta} | CNG:${resources.cng} | Údržba:${resources.udrzba} | Autobusy:${resources.autobusy}`;}
setInterval(updateEconomy,3000);

// --- Jízdenky ---
document.getElementById('sell-ticket').addEventListener('click',()=>{
  const type=document.getElementById('ticket-type').value;
  const pay=document.getElementById('payment').value;
  alert(`Prodána jízdenka: ${type} | Platba: ${pay}`);
});

// --- Autobusy vizuálně ---
const canvasContainer=document.getElementById('canvas-container');
let busDivs=[];
function animateBus(){
  canvasContainer.innerHTML='<div id="road"></div>';
  const busDiv=document.createElement('div');
  busDiv.classList.add('bus');
  busDiv.style.left='20px';
  busDiv.style.background=buses.find(b=>b.models.includes(selectedBus)).color;
  busDiv.textContent=selectedBus;
  canvasContainer.appendChild(busDiv);
  let pos=20;
  const id=setInterval(()=>{
    if(pos>canvasContainer.offsetWidth-100){clearInterval(id);return;}
    pos+=2;
    busDiv.style.left=pos+'px';
  },30);
}
</script>
</body>
</html>
